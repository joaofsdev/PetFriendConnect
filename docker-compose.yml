services:
  mysql:
    image: mysql:8.0
    container_name: petfriend-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-petfriend_connect}
      MYSQL_USER: ${MYSQL_USER:-petfriend}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-petfriend_password}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: petfriend-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: mysql://${MYSQL_USER:-petfriend}:${MYSQL_PASSWORD:-petfriend_password}@mysql:3306/${MYSQL_DATABASE:-petfriend_connect}
      JWT_SECRET: ${JWT_SECRET:-change_me_for_production}
      API_URL: ${API_URL:-http://localhost:3001}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:3001/api/auth/google/callback}
      FACEBOOK_CLIENT_ID: ${FACEBOOK_CLIENT_ID:-}
      FACEBOOK_CLIENT_SECRET: ${FACEBOOK_CLIENT_SECRET:-}
      FACEBOOK_REDIRECT_URI: ${FACEBOOK_REDIRECT_URI:-http://localhost:3001/api/auth/facebook/callback}
      FACEBOOK_GRAPH_VERSION: ${FACEBOOK_GRAPH_VERSION:-v20.0}
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    command: ["sh", "-c", "npx prisma migrate deploy && npm start"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: petfriend-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: petfriend-cloudflared
    profiles:
      - tunnel
    restart: unless-stopped
    depends_on:
      - frontend
    command: tunnel --no-autoupdate --url http://frontend:80

volumes:
  mysql_data:
